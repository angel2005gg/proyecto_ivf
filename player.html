<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IVF Player</title>
  <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg: #0d0d0d;
      --radius: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 10px;
      gap: 12px;
      min-height: 100%;
    }

    /* ── Header ── */
    h1 {
      font-size: clamp(1rem, 4vw, 1.3rem);
      letter-spacing: 0.07em;
      color: #e0e0e0;
    }

    #load-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 13px 28px;
      border-radius: 8px;
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      cursor: pointer;
      touch-action: manipulation;
      width: min(90vw, 280px);
      transition: background 0.15s;
    }
    #load-btn:active { background: var(--accent-hover); }

    #status {
      font-size: clamp(0.72rem, 3vw, 0.82rem);
      color: #888;
      text-align: center;
      min-height: 1.1em;
      padding: 0 8px;
    }

    /* ── Player container ── */
    #player-wrap {
      position: relative;
      width: 100%;
      max-width: min(576px, 100vw);
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      /* portrait video → altura proporcional */
      aspect-ratio: 9 / 16;
    }

    #video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Choice overlay ── */
    .choice-bg {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 3vw, 14px);
      padding: 24px 20px;
      pointer-events: auto;
    }

    .choice-btn {
      background: #fff;
      color: #111;
      border: none;
      border-radius: 999px;
      padding: clamp(13px, 3vh, 16px) clamp(24px, 7vw, 40px);
      font-size: clamp(0.95rem, 4vw, 1.05rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      touch-action: manipulation;
      width: min(85%, 280px);
      min-height: 52px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      transition: opacity 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active { opacity: 0.75; transform: scale(0.97); }
    @media (hover: hover) {
      .choice-btn:hover { opacity: 0.88; transform: scale(1.02); }
    }

    /* ── Tap zone ── */
    .tap-zone {
      position: absolute;
      border: 2.5px solid rgba(255, 220, 0, 0.9);
      background: rgba(255, 220, 0, 0.08);
      border-radius: 6px;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
      animation: pulse 1.1s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tap-zone::after {
      content: '▶';
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      color: rgba(255, 220, 0, 0.9);
    }
    .tap-zone:active { background: rgba(255, 220, 0, 0.25); }
    @media (hover: hover) {
      .tap-zone:hover { background: rgba(255, 220, 0, 0.22); }
    }

    @keyframes pulse {
      0%, 100% { border-color: rgba(255, 220, 0, 0.9); }
      50%       { border-color: rgba(255, 220, 0, 0.2); }
    }

    /* ── en pantallas muy pequeñas quitar border-radius del player ── */
    @media (max-width: 400px) {
      #player-wrap { border-radius: 0; max-width: 100vw; }
      body { padding: 14px 0; gap: 10px; }
    }
  </style>
</head>
<body>

  <h1>IVF Player</h1>

  <input type="file" id="file-picker" accept=".mp4,video/mp4" style="display:none">
  <button id="load-btn" onclick="document.getElementById('file-picker').click()">
    Abrir video.ivf.mp4
  </button>

  <div id="status">Ningún archivo cargado</div>

  <div id="player-wrap">
    <video id="video" controls playsinline webkit-playsinline></video>
    <div id="overlay"></div>
  </div>

  <script>
    const video      = document.getElementById('video');
    const overlay    = document.getElementById('overlay');
    const statusEl   = document.getElementById('status');
    const playerWrap = document.getElementById('player-wrap');

    let sortedEvents = [];
    let nextEventIdx = 0;

    // ─── Carga de archivo ────────────────────────────────────────────────────

    document.getElementById('file-picker').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) loadIVF(file);
    });

    function loadIVF(file) {
      sortedEvents = [];
      nextEventIdx = 0;
      overlay.innerHTML = '';

      if (video.src) URL.revokeObjectURL(video.src);
      video.src = URL.createObjectURL(file);
      playerWrap.style.display = 'block';
      statusEl.textContent = 'Analizando IVF track…';

      const mp4box = MP4Box.createFile();

      mp4box.onReady = function(info) {
        const ivfTrack = info.tracks.find(t =>
          (t.codec && t.codec.includes('mett')) ||
          t.name === 'IVF_Track' ||
          t.type === 'metadata'
        );
        if (!ivfTrack) {
          statusEl.textContent = 'Sin IVF track — reproducción normal.';
          return;
        }
        mp4box.setExtractionOptions(ivfTrack.id, null, { nbSamples: 9999 });
        mp4box.start();
      };

      mp4box.onSamples = function(_id, _ref, samples) {
        for (const s of samples) {
          let ev;
          try { ev = JSON.parse(new TextDecoder().decode(s.data)); }
          catch { continue; }
          ev._time = s.dts / s.timescale;
          ev._id   = ev.id || ('auto-' + ev._time);
          if (ev.type !== 'manifest') sortedEvents.push(ev);
        }
        sortedEvents.sort((a, b) => a._time - b._time);
        statusEl.textContent = `IVF listo — ${sortedEvents.length} evento(s).`;
      };

      mp4box.onError = err => { statusEl.textContent = 'Error MP4: ' + err; };

      const reader = new FileReader();
      reader.onload = e => {
        const buf = e.target.result;
        buf.fileStart = 0;
        mp4box.appendBuffer(buf);
        mp4box.flush();
      };
      reader.readAsArrayBuffer(file);
    }

    // ─── Sincronización ──────────────────────────────────────────────────────

    video.addEventListener('seeking', () => {
      clearInteractiveUI();
      const ct = video.currentTime;
      nextEventIdx = sortedEvents.findIndex(e => e._time > ct);
      if (nextEventIdx === -1) nextEventIdx = sortedEvents.length;
    });

    video.addEventListener('timeupdate', () => {
      const ct = video.currentTime;
      while (
        nextEventIdx < sortedEvents.length &&
        sortedEvents[nextEventIdx]._time <= ct
      ) {
        executeEvent(sortedEvents[nextEventIdx]);
        nextEventIdx++;
      }
    });

    // ─── Ejecución de eventos ────────────────────────────────────────────────

    function executeEvent(ev) {
      switch (ev.type) {
        case 'choice':   showChoice(ev);  break;
        case 'tap_zone': showTapZone(ev); break;
        case 'pause':    video.pause();   break;
        case 'jump':
          if (ev.target !== undefined) video.currentTime = ev.target;
          break;
      }
    }

    function showChoice(ev) {
      video.pause();
      const bg = document.createElement('div');
      bg.className = 'choice-bg';

      for (const opt of (ev.options || [])) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;

        const pick = () => {
          bg.remove();
          if (opt.jump !== undefined) video.currentTime = opt.jump;
          video.play();
        };

        btn.addEventListener('click', pick);
        btn.addEventListener('touchend', e => { e.preventDefault(); pick(); });
        bg.appendChild(btn);
      }

      overlay.appendChild(bg);
    }

    function showTapZone(ev) {
      const z = ev.zone;
      if (!z) return;
      const el = document.createElement('div');
      el.className = 'tap-zone';
      el.style.left   = (z.x * 100) + '%';
      el.style.top    = (z.y * 100) + '%';
      el.style.width  = (z.w * 100) + '%';
      el.style.height = (z.h * 100) + '%';

      const act = () => { el.remove(); executeAction(ev.action, ev); };
      el.addEventListener('click', act);
      el.addEventListener('touchend', e => { e.preventDefault(); act(); });
      overlay.appendChild(el);
      setTimeout(() => el.remove(), 10000);
    }

    function executeAction(action, ev) {
      switch (action) {
        case 'jump':
          if (ev.target !== undefined) { video.currentTime = ev.target; video.play(); }
          break;
        case 'pause':  video.pause(); break;
        case 'open_url':
          if (ev.url) window.open(ev.url, '_blank', 'noopener,noreferrer');
          break;
      }
    }

    function clearInteractiveUI() { overlay.innerHTML = ''; }
  </script>
</body>
</html>
